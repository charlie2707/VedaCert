name: VedaCert CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Build and Test Rust Smart Contracts
  contracts:
    name: Build & Test Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Run Contract Tests
        run: cargo test --verbose

      - name: Install Stellar CLI
        run: |
          cargo install --locked stellar-cli --version 22.0.1 || true

      - name: Build WASM binaries
        run: |
          cargo build --target wasm32-unknown-unknown --release

  # Job 2: Build and Test Next.js Frontend
  frontend:
    name: Build & Test Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm install --ignore-scripts

      - name: Run Linter
        run: |
          cd frontend
          npm run lint --if-present

      - name: Run Vitest Unit Tests
        run: |
          cd frontend
          npx vitest run

      - name: Build Next.js Production bundle
        run: |
          cd frontend
          npm run build --if-present
